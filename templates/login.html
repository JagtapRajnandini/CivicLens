{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="container page">
  <div style="max-width:400px;margin:3rem auto;">
    <div class="ai-panel">
      <div class="ai-panel-header">🔐 Admin Login</div>
      <div class="ai-panel-body">
        <p class="text-sm text-muted mb-3">This area is restricted to administrators.</p>
        <form method="POST" action="{{ url_for('login') }}">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-control" name="username" id="username"
                   autocomplete="username" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" name="password" id="password"
                   autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-full">Login</button>
        </form>
        <p class="text-sm text-muted mt-2" style="text-align:center;">
          <a href="{{ url_for('index') }}">← Back to CivicLens</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
